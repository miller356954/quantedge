name: Refresh Dashboard Data

# ── SCHEDULE ──────────────────────────────────────────────────────
# Runs every 15 minutes during market hours (Mon–Fri).
# Cron is in UTC. NYSE is roughly 13:30–21:00 UTC (adjusts with DST).
# We run 13:00–21:30 UTC to catch pre/post-market and avoid gaps.
# Also triggers on any push (keeps the workflow "active" on GitHub).
on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"   # Every 15 min, Mon-Fri, 13:00-21:59 UTC
    - cron: "0 13 * * 6"            # Saturday 13:00 UTC – one update for weekend review
  push:
    branches: ["main"]
  workflow_dispatch:                 # Allows manual trigger from GitHub Actions UI

# ── PERMISSIONS ────────────────────────────────────────────────────
permissions:
  contents: write     # Needed to commit data.json back to the repo

# ── JOB ────────────────────────────────────────────────────────────
jobs:
  refresh:
    name: Generate Dashboard Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Run the data generator
      - name: Generate data.json
        run: python generate_data.py

      # 5. Commit & push the updated data.json (only if it changed)
      - name: Commit and push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data.json
          # Only commit if data.json actually changed
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit."
          else
            git commit -m "chore: refresh dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
